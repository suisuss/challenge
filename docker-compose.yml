name: challenge

x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  ports:
    - "5007:5007"
  env_file:
    - ./backend/.env
  environment:
    DATABASE_URL: postgresql://postgres:postgres@db:5432/school_mgmt
  depends_on:
    db:
      condition: service_healthy

x-frontend-common: &frontend-common
  build:
    context: ./frontend
    dockerfile: Dockerfile
  env_file:
    - ./frontend/.env

x-go-service-common: &go-service-common
  build:
    context: ./go-service
    dockerfile: Dockerfile
  ports:
    - "5008:5008"
  environment:
    DATABASE_URL: postgresql://postgres:postgres@db:5432/school_mgmt
    PORT: "5008"
  depends_on:
    db:
      condition: service_healthy

services:
  # ========================
  # PostgreSQL
  # ========================
  db:
    image: postgres:16-alpine
    profiles: ["dev", "prod"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: school_mgmt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./seed_db/tables.sql:/docker-entrypoint-initdb.d/01-tables.sql:ro
      - ./seed_db/seed-db.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d school_mgmt"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ========================
  # Backend - Dev
  # ========================
  backend-dev:
    <<: *backend-common
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    profiles: ["dev"]
    volumes:
      - ./backend/src:/app/src
      - ./backend/public:/app/public

  # ========================
  # Backend - Prod
  # ========================
  backend-prod:
    <<: *backend-common
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    profiles: ["prod"]
    restart: unless-stopped

  # ========================
  # Frontend - Dev
  # ========================
  frontend-dev:
    <<: *frontend-common
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    profiles: ["dev"]
    ports:
      - "5173:5173"
    environment:
      BROWSER: none
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json

  # ========================
  # Frontend - Prod
  # ========================
  frontend-prod:
    <<: *frontend-common
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5007}
    profiles: ["prod"]
    ports:
      - "3000:3000"
    restart: unless-stopped

  # ========================
  # Go PDF Service - Dev
  # ========================
  go-service-dev:
    <<: *go-service-common
    build:
      context: ./go-service
      dockerfile: Dockerfile
      target: dev
    profiles: ["dev"]
    volumes:
      - ./go-service:/app

  # ========================
  # Go PDF Service - Prod
  # ========================
  go-service-prod:
    <<: *go-service-common
    build:
      context: ./go-service
      dockerfile: Dockerfile
      target: prod
    profiles: ["prod"]
    restart: unless-stopped

volumes:
  pgdata:
