name: CI

on:
  push:
    branches-ignore:
      - master
      - deploy
  pull_request:
    branches:
      - deploy

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      go-service: ${{ steps.filter.outputs.go-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci-frontend.yml'
            backend:
              - 'backend/**'
              - '.github/workflows/ci-backend.yml'
            go-service:
              - 'go-service/**'
              - '.github/workflows/ci-go-service.yml'

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/ci-frontend.yml

  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/ci-backend.yml

  go-service:
    name: Go Service
    needs: changes
    if: needs.changes.outputs.go-service == 'true'
    uses: ./.github/workflows/ci-go-service.yml
